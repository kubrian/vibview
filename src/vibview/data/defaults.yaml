# ── Rendering — appearance and performance ─────────────────────
rendering:
  # Performance preset: low (coarse), medium, high (fine).
  # Controls sphere subdivision level (low=1, medium=2, high=4).
  quality: medium

  # Lighting model: null (auto, quality-based default), flat, smooth.
  shading: null

  # Background colour (hex or named).
  background_color: "#1e1e24"

  # Fallback atom sphere colour (when element colour is unknown).
  atom_color: "#4488ff"

  # Fallback atom sphere radius in Å (when element radius is unknown).
  atom_radius: 0.3

  # Multiplier applied to all covalent radii.
  radii_scale: 0.8

  # Bond tube colour.
  bond_color: "#888888"

  # Bond tube radius in Å.
  bond_radius: 0.08

  # Extra distance added to covalent radius sum for bond detection (Å).
  bond_tolerance: 0.4

# ── Lighting — scene lighting parameters ──────────────────────
lighting:
  # Ambient light colour + alpha (RGBA, 0–1).
  ambient: [1.0, 1.0, 1.0, 0.85]

  # Diffuse light colour + alpha.
  diffuse: [1.0, 1.0, 1.0, 0.15]

  # Specular light colour + alpha.
  specular: [1.0, 1.0, 1.0, 0.35]

  # Specular shininess exponent.
  shininess: 60.0

# ── Camera — viewport and camera defaults ─────────────────────
camera:
  # Field of view (degrees).
  fov: 45

  # Fill factor for auto-distance calculation.
  fill_factor: 0.75

  # Minimum camera distance clamp (Å).
  min_distance: 5.0

  # Default canvas window size (width, height).
  default_window_size: [608, 608]

  # Axis indicator sub-view size (pixels).
  axis_view_size: 100

  # Axis indicator sub-view padding (pixels).
  axis_view_padding: 0

  # Axis indicator sub-view camera distance.
  axis_camera_distance: 5.0

  # Axis indicator sub-view FOV (degrees).
  axis_camera_fov: 30

# ── Axis — coordinate axis indicators ─────────────────────────
axis:
  # Arrow shaft radius for Cartesian axes (Å).
  shaft_radius: 0.03

  # Arrow shaft radius for lattice-vector axes (Å).
  lattice_shaft_radius: 0.04

  # Tip length = vector length × factor (capped at tip_length_max).
  tip_length_factor: 0.3

  # Maximum tip length (Å).
  tip_length_max: 0.3

  # Tip radius = shaft_radius × factor.
  tip_radius_factor: 2.0

  # Colours for lattice-vector axes [a, b, c].
  colors_lattice: ["#ff8888", "#88ff88", "#8888ff"]

  # Colours for Cartesian axes [x, y, z].
  colors_cartesian: ["#ff4444", "#44ff44", "#4444ff"]

  # Arrow length in the axis indicator sub-view (Å).
  arrow_length: 0.8

  # Label offset from arrow tip (Å).
  label_offset: 0.2

  # Label font size.
  label_font_size: 40

# ── Animation — viewer animation ──────────────────────────────
animation:
  # Interactive viewer frames per second.
  fps: 30

  # Animation cycle period in seconds.
  period: 1.0

  # Default maximum atomic displacement amplitude in Å.
  default_amplitude: 0.1

  # Default mode: animate, static, or overlay.
  default_mode: "animate"

# ── Lattice — unit-cell box ───────────────────────────────────
lattice:
  # Box edge colour.
  color: "#888888"

  # Box edge tube radius in Å.
  width: 0.05

  # Box opacity (0–1).
  alpha: 0.5

# ── Static — displacement arrows ──────────────────────────────
static:
  # Maximum arrow displacement amplitude in Å.
  amplitude: 0.5

  # Arrow colour.
  arrow_color: "#ff7700"

  # Shaft radius = bond_radius × factor.
  arrow_shaft_radius_factor: 1.5

  # Cone tip radius = shaft_radius × factor.
  arrow_tip_radius_factor: 1.5

  # Tip length = vector length × factor (capped).
  arrow_tip_length_factor: 0.3

  # Maximum tip length = amplitude × factor.
  arrow_tip_length_max_factor: 0.4

# ── Overlay — wireframe overlays ──────────────────────────────
overlay:
  # Maximum displacement amplitude in Å.
  amplitude: 0.5

  # Equilibrium-structure wireframe colour.
  eq_color: "#8faacc"

  # Equilibrium wireframe opacity (0–1).
  eq_alpha: 0.12

  # Tube radius multiplier for equilibrium bonds.
  eq_radius_multiplier: 1.0

  # Displaced-structure wireframe colour.
  disp_color: "#ff4040"

  # Displaced wireframe opacity (0–1).
  disp_alpha: 0.85

  # Tube radius multiplier for displaced bonds.
  disp_radius_multiplier: 0.67

# ── Display — metadata and overlays ───────────────────────────
display:
  # Label shown next to frequency values (e.g. "cm⁻¹").
  frequency_units: "?"

  # Colour for imaginary-frequency rows in the mode list.
  imaginary_color: "#ff4444"

  # Show axis indicators (x, y, z arrows).
  show_axis: true

  # Supercell replication (nx, ny, nz). Only meaningful for periodic structures.
  supercell: [1, 1, 1]

# ── Export — animation export ─────────────────────────────────
export:
  # Frames per second for GIF export.
  gif_fps: 10

  # Frames per second for MP4 export.
  mp4_fps: 60

  # Number of oscillation periods to render in the exported file.
  cycles: 1

