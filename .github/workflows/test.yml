name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - macos-13 # x86_64 Intel macOS
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0
        with:
          pixi-version: v0.67.2
          cache: true
          activate-environment: default

      - name: Run pre-commit hooks
        run: pixi run pre-commit run --all-files || true

      - name: Run tests with coverage
        env:
          QT_QPA_PLATFORM: offscreen
        run: pixi run pytest --cov=vibview --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.xml
