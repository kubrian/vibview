name: Bug report
description: Report a problem with vibview
labels: [bug]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: What command(s) did you run? What file(s) did you use?
      placeholder: |
        1. vibview view my_file.hess orca
        2. Select mode 3
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error output if applicable.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Paste the output of `vibview --version` (if available) or describe
        your OS, Python version, and installation method.
      placeholder: |
        OS: Ubuntu 24.04
        Python: 3.10.18
        Installation: pip install git+https://...
    validations:
      required: true
