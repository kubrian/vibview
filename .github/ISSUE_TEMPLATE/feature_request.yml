name: Feature request
description: Suggest an idea for vibview
labels: [enhancement]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve? What is the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there workarounds or alternative approaches?
